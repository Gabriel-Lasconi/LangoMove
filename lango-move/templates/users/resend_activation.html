{% extends "base.html" %}

{% block title %}Resend activation link | LangoMove{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="container">
        <div class="card profile-form-card">
            <div class="card-body">
                <div class="profile-section-heading">
                    <h1>Resend activation link</h1>
                    <p>Enter your email address and we will send you a new confirmation link.</p>
                </div>

                <form method="post" class="profile-form">
                    {% csrf_token %}

                    <div class="auth-field auth-field-full">
                        <label for="id_email">Email</label>
                        <input type="email" name="email" id="id_email" placeholder="Email address" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="button">Send new link</button>
                        <a href="{% url 'login' %}" class="button-secondary">Back to login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
